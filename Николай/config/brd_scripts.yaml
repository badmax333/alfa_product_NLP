# Скрипты и сегменты из BRD сэйлз-аргументы.pdf (онбординг + продукты)
source: "BRD сэйлз-аргументы.pdf"

compliance:
  - "Не обещать гарантированную доходность"
  - "Не давить на клиента"
  - "Не использовать негативные манипуляции (арест, развод и т.п.)"
  - "Персонализация без сухого перечисления цифр из профиля"

onboarding_call_structure:
  - id: greeting
    title: "Приветствие + контакт"
    snippet: |
      Здравствуйте, меня зовут [Имя], я менеджер по адаптации, бизнес-консультант в АО Альфа-Банк.
      Звоню по компании [ИП/ООО], вы недавно открыли у нас расчётный счёт.
      Мой звонок приветственный: узнать, как дела после открытия, рассказать о сервисах и бонусах.
  - id: business_discovery
    title: "Знакомство с бизнесом"
    discovery_questions:
      - "Бизнес новый или уже работали в этой сфере?"
      - "Кто будет вашими клиентами?"
      - "Какими операциями по счёту планируете пользоваться чаще всего?"
  - id: anchor_services
    title: "Якорные сервисы"
    note: "Цель онбординга — 2+ якорных сервиса"

# Сегменты ЗПП (BRD, пример подхода)
zpp_segments:
  - segment_name: "Молодые ЮЛ с низкой выручкой"
    filters: "smb_type_code=1 AND revenue IN ('0-5','5-20') AND ogrn_months<=12"
    sales_argument: |
      Бесплатное обслуживание, выпуск карт с логотипом и перечисление зарплаты в день отправки —
      всё для того, чтобы вы сосредоточились на росте бизнеса, а не на бухгалтерии.
    why_it_fits: "Молодые компании ценят скорость, нулевые комиссии и поддержку при старте."
  - segment_name: "ИП с регулярными выплатами физлицам"
    filters: "smb_type_code=2 AND abm_paymentfiz_rate>0.5"
    sales_argument: |
      Отсутствие комиссий за переводы и зачисление зарплаты в день отправки — идеально для ИП с командой.
    why_it_fits: "Высокая доля платежей физлицам — продукт решает ключевую боль."
  - segment_name: "ЮЛ с высокой выручкой и наличными"
    filters: "smb_type_code=1 AND revenue high AND cnt_deb_atm_30>10"
    sales_argument: |
      Переводите зарплату без комиссий и откажитесь от наличных — карты с логотипом и зачисление в день отправки упростят бухгалтерию.
    why_it_fits: "Частые снятия наличных — признак неэффективной зарплатной системы."

# Подписка (вариант 2 BRD — шаблон с подстановкой параметров)
subscription_script_template: |
  Сейчас вы на ПУ [название ПУ], ваш лимит на внутренние переводы себе на счёт ФЛ [лимит] руб.
  Вы в среднем проводите [оборот] руб. в месяц, а с подпиской [название подписки] лимит можно увеличить до [новый лимит] руб.

products:
  zpp:
    onboarding_scenario_id: 10
    section: "5. Предпродажа — Зарплатный проект"
    discovery_questions:
      - "Вы ИП, ООО — работаете сами или есть сотрудники в штате?"
      - "Как планируете выплачивать зарплату себе или сотрудникам?"
      - "Планируете в будущем набирать штат?"
    opener: |
      Имя, для вашего бизнеса у нас есть готовое решение — в ваш тариф уже входит бесплатный зарплатный проект.
    benefits:
      - "Экономия на переводах зарплаты, без комиссии"
      - "Выпуск и обслуживание карт 0 рублей"
      - "Зачисление одним реестром, интеграция с 1С"
      - "Бесплатное снятие в банкоматах по России"
    closing: "В течение трёх рабочих дней позвоним, чтобы рассказать о продукте и как его активировать."

  alfa_payments:
    onboarding_scenario_id: 6
    section: "3. Тарифы + подписка (Альфа-платежи)"
    discovery_questions:
      - "Вы уже посмотрели ваш тариф и лимиты на переводы?"
      - "Вам нужен лимит на переводы в полном объёме?"
    opener: |
      Имя, чтобы сэкономить на переводах, вы можете подключить подписку «Альфа-платежи» — расширенные лимиты на переводы физлицам и юрлицам.
    benefits:
      - "Увеличенный лимит на переводы"
      - "Экономия на комиссиях при активных оборотах"
      - "Управление в разделе Тариф → Сервисы → Подписки"
    script_variant2_example: |
      Сейчас вы на ПУ Активные расчёты, лимит на переводы себе на счёт ФЛ 600 000 руб.
      Вы в среднем проводите 1 058 625 руб. в месяц — с подпиской Альфа-платежи лимит до 3 200 000 руб.

  nachalo:
    onboarding_scenario_id: 6
    section: "3. Тарифы + подписка («Начало»)"
    discovery_questions:
      - "Как часто делаете переводы физлицам и юрлицам?"
      - "Планируете увеличивать обороты по счёту?"
    opener: |
      Имя, чтобы сэкономить на переводах на старте, можно подключить подписку «Начало» — для клиентов с нулевым или базовым пакетом услуг.
    benefits:
      - "Подписка для старта без большого пакета"
      - "Прозрачные лимиты и комиссии"
      - "Подключение в интернет-банке за несколько минут"

  trade_acquiring:
    onboarding_scenario_id: 7
    section: "5. Предпродажа — Торговый эквайринг"
    discovery_questions:
      - "Ваши клиенты — физические или юридические лица?"
      - "Как ведёте расчёты с физлицами?"
      - "ОКВЭД розничная торговля — всё верно?"
    opener: |
      Имя, для вашего бизнеса есть готовое решение для приёма безналичной оплаты от клиентов.
    benefits:
      - "Бесплатный терминал, гибкие тарифы"
      - "Зачисления в выходные"
      - "Рост лояльности и среднего чека на 10–15%"
      - "Сокращение расходов на инкассацию"
    objection_handlers:
      - "Мне хотелось бы понять, почему наш продукт вам не подходит?"
      - "Поясните, с какими именно условиями вы не согласны?"
    closing: "В течение трёх рабочих дней позвоним для консультации и активации."

  internet_acquiring:
    onboarding_scenario_id: 11
    section: "5. Предпродажа — Интернет-эквайринг"
    discovery_questions:
      - "ОКВЭД связан с интернет-продажами — всё верно?"
      - "Как проводите расчёты на сайте или в интернет-магазине?"
      - "Используете сайт, соцсети или планируете интернет-магазин?"
    opener: |
      Мы работаем с компаниями в сфере [отрасль] — вашему бизнесу могут быть полезны решения по приёму онлайн-платежей.
      Вы сейчас принимаете платежи через интернет или рассматриваете такую возможность?
    benefits:
      - "Бесплатное подключение, гибкие тарифы"
      - "СБП, Yandex Pay, Mir Pay"
      - "Оплата по ссылке в мессенджере"
      - "Поддержка запуска для вашей отрасли"
    closing: "Предлагаю обсудить повторно через 2–3 недели или оформить заявку в SFA."

  tax_jar:
    onboarding_scenario_id: 14
    section: "3. Якорные — Налоговая копилка"
    discovery_questions:
      - "Как планируете оплачивать налоги?"
    opener: |
      Имя, хочу предложить удобный сервис — отдельный счёт «Налоговая копилка» с начислением процентов на остаток.
    benefits:
      - "Откладывать по чуть-чуть — не искать деньги в последний момент"
      - "Платежи только в бюджет — дисциплина накоплений"
      - "Проценты на ежедневный остаток до 3% годовых"
      - "Открытие в приложении или интернет-банке"

  savings:
    onboarding_scenario_id: null
    section: "Якорные — Накопительный счёт"
    opener: |
      Накопительный счёт для бизнеса — бесплатный счёт с процентами на остаток, автопополнение с расчётного счёта.
    benefits:
      - "Накопление на цели (аренда, резерв)"
      - "Автопополнение по расписанию или % от поступлений"
      - "Бесплатное открытие и обслуживание"

  accounting:
    onboarding_scenario_id: 12
    section: "Якорные — Бухгалтерия"
    opener: |
      При открытии счёта можно подключить сервис «Бухгалтерия» — расчёт налогов, отчётность онлайн, налоговая копилка.
    benefits:
      - "ИП на УСН «Доходы», патент, ООО (автонакопления)"
      - "Автоматическое уменьшение налога на взносы"
      - "Онлайн-подача декларации и уведомлений"

  mobile_app:
    onboarding_scenario_id: 15
    section: "3. Якорные — Мобильное приложение"
    opener: |
      Для удобной работы со счётом рекомендуем интернет-банк и мобильное приложение — работа 24/7, аналитика, чат с поддержкой.
    benefits:
      - "Можно добавить бухгалтера как пользователя"
      - "Установка с сайта (Android) или App Store (iPhone)"
